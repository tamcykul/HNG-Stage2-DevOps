name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Docker Compose (new GitHub runners already have Docker)
      - name: Verify Docker installation
        run: docker --version

      # 3. Build and start all services (api + redis + worker)
      - name: Build and start containers
        run: docker compose up -d --build

      # 4. Wait for services to be ready (important for Redis + FastAPI startup)
      - name: Wait for services
        run: sleep 15

      # 5. Run tests inside API container
      - name: Run tests
        run: docker exec api pytest -v

      # 6. Always clean up containers
      - name: Shutdown containers
        if: always()
        run: docker compose down -v